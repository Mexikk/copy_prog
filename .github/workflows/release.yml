name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # === СБОРКА ДЛЯ WINDOWS ===
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows .exe
        run: cargo build --release
      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/copy_prog.exe -DestinationPath copy_prog-windows-x64.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: copy_prog-windows-x64.zip

  # === СБОРКА ДЛЯ LINUX ===
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build binary
        run: cargo build --release
      
      - name: Build .deb package
        run: cargo deb --no-build
      
      - name: Create AppImage with icons
        run: |
          # Скачиваем linuxdeploy и плагины
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-appimage-x86_64.AppImage
          
          # Создаём структуру AppDir
          mkdir -p copy_prog.AppDir/usr/bin
          mkdir -p copy_prog.AppDir/usr/share/icons/hicolor/16x16/apps
          mkdir -p copy_prog.AppDir/usr/share/icons/hicolor/32x32/apps
          mkdir -p copy_prog.AppDir/usr/share/icons/hicolor/48x48/apps
          mkdir -p copy_prog.AppDir/usr/share/icons/hicolor/128x128/apps
          mkdir -p copy_prog.AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Копируем бинарник
          cp target/release/copy_prog copy_prog.AppDir/usr/bin/
          
          # Копируем иконки разных размеров в hicolor
          [ -f icons/icon-16.png ] && cp icons/icon-16.png copy_prog.AppDir/usr/share/icons/hicolor/16x16/apps/copy_prog.png
          [ -f icons/icon-32.png ] && cp icons/icon-32.png copy_prog.AppDir/usr/share/icons/hicolor/32x32/apps/copy_prog.png
          [ -f icons/icon-48.png ] && cp icons/icon-48.png copy_prog.AppDir/usr/share/icons/hicolor/48x48/apps/copy_prog.png
          [ -f icons/icon-128.png ] && cp icons/icon-128.png copy_prog.AppDir/usr/share/icons/hicolor/128x128/apps/copy_prog.png
          [ -f icons/icon-256.png ] && cp icons/icon-256.png copy_prog.AppDir/usr/share/icons/hicolor/256x256/apps/copy_prog.png
          
          # ⭐ ВАЖНО: Копируем иконку в КОРЕНЬ AppDir (требует appimagetool)
          cp icons/icon-256.png copy_prog.AppDir/copy_prog.png
          
          # Создаём .desktop файл
          cat > copy_prog.AppDir/copy_prog.desktop << 'EOF'
[Desktop Entry]
Name=Copy_prog
Comment=Утилита для сбора файлов из монорепозитория
Exec=copy_prog
Icon=copy_prog
Terminal=true
Type=Application
Categories=Utility;
EOF
          
          # Собираем AppImage с явным указанием файлов
          ./linuxdeploy-x86_64.AppImage \
            --appdir copy_prog.AppDir \
            --plugin appimage \
            --desktop-file=copy_prog.AppDir/copy_prog.desktop \
            --icon-file=copy_prog.AppDir/copy_prog.png \
            --output appimage
          
          # Переименовываем результат
          ls -la *.AppImage
          mv Copy_prog*.AppImage copy_prog-linux-x64.AppImage 2>/dev/null || \
          mv copy_prog*.AppImage copy_prog-linux-x64.AppImage 2>/dev/null || true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            target/debian/*.deb
            copy_prog-linux-x64.AppImage

  # === СБОРКА ДЛЯ MACOS ===
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bundle
        run: cargo install cargo-bundle
      - name: Build binary
        run: cargo build --release
      - name: Create .icns from PNGs
        run: |
          mkdir -p icon.iconset
          [ -f icons/icon-16.png ] && sips -z 16 16 icons/icon-16.png --out icon.iconset/icon_16x16.png
          [ -f icons/icon-32.png ] && sips -z 32 32 icons/icon-32.png --out icon.iconset/icon_16x16@2x.png
          [ -f icons/icon-32.png ] && sips -z 32 32 icons/icon-32.png --out icon.iconset/icon_32x32.png
          [ -f icons/icon-128.png ] && sips -z 64 64 icons/icon-128.png --out icon.iconset/icon_32x32@2x.png
          [ -f icons/icon-128.png ] && sips -z 128 128 icons/icon-128.png --out icon.iconset/icon_128x128.png
          [ -f icons/icon-256.png ] && sips -z 256 256 icons/icon-256.png --out icon.iconset/icon_128x128@2x.png
          [ -f icons/icon-256.png ] && sips -z 256 256 icons/icon-256.png --out icon.iconset/icon_256x256.png
          [ -f icons/icon-512.png ] && sips -z 512 512 icons/icon-512.png --out icon.iconset/icon_256x256@2x.png
          [ -f icons/icon-512.png ] && sips -z 512 512 icons/icon-512.png --out icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset || true
      - name: Build .app bundle
        run: cargo bundle --release
        continue-on-error: true
      - name: Create DMG installer
        run: |
          if [ -d "target/release/bundle/osx/Copy_prog.app" ]; then
            hdiutil create -volname "Copy_prog" -srcfolder target/release/bundle/osx/Copy_prog.app -ov -format UDZO copy_prog-macos-x64.dmg
          else
            mkdir -p release-macos
            cp target/release/copy_prog release-macos/
            tar czf copy_prog-macos-x64.tar.gz -C release-macos .
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            copy_prog-macos-x64.dmg
            copy_prog-macos-x64.tar.gz

  # === СОЗДАНИЕ РЕЛИЗА ===
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp windows-build/*.zip release-files/ 2>/dev/null || true
          cp linux-build/*.deb release-files/ 2>/dev/null || true
          cp linux-build/*.AppImage release-files/ 2>/dev/null || true
          cp macos-build/*.dmg release-files/ 2>/dev/null || true
          cp macos-build/*.tar.gz release-files/ 2>/dev/null || true
          ls -la release-files/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}