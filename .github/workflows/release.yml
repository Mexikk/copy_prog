name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # === СБОРКА ДЛЯ WINDOWS ===
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Windows .exe
        run: cargo build --release
      
      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/copy_prog.exe -DestinationPath copy_prog-windows-x64.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: copy_prog-windows-x64.zip

  # === СБОРКА ДЛЯ LINUX ===
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      
      - name: Install cargo-deb
        run: cargo install cargo-deb
      
      - name: Build binary
        run: cargo build --release
      
      - name: Build .deb package
        run: cargo deb --no-build
      
      - name: Create tar.gz archive
        run: |
          mkdir -p release-linux
          cp target/release/copy_prog release-linux/
          cp README.md release-linux/ 2>/dev/null || true
          cp LICENSE release-linux/ 2>/dev/null || true
          cd release-linux
          tar czf ../copy_prog-linux-x64.tar.gz *
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            target/debian/*.deb
            copy_prog-linux-x64.tar.gz

  # === СБОРКА ДЛЯ MACOS ===
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-bundle
        run: cargo install cargo-bundle
      
      - name: Build binary
        run: cargo build --release
      
      - name: Create .icns from PNGs
        run: |
          mkdir -p icon.iconset
          if [ -f icons/icon-16.png ]; then
            sips -z 16 16 icons/icon-16.png --out icon.iconset/icon_16x16.png
            sips -z 32 32 icons/icon-32.png --out icon.iconset/icon_16x16@2x.png
          fi
          if [ -f icons/icon-32.png ]; then
            sips -z 32 32 icons/icon-32.png --out icon.iconset/icon_32x32.png
            sips -z 64 64 icons/icon-32.png --out icon.iconset/icon_32x32@2x.png
          fi
          if [ -f icons/icon-128.png ]; then
            sips -z 128 128 icons/icon-128.png --out icon.iconset/icon_128x128.png
            sips -z 256 256 icons/icon-128.png --out icon.iconset/icon_128x128@2x.png
          fi
          if [ -f icons/icon-256.png ]; then
            sips -z 256 256 icons/icon-256.png --out icon.iconset/icon_256x256.png
            sips -z 512 512 icons/icon-256.png --out icon.iconset/icon_256x256@2x.png
          fi
          if [ -f icons/icon-512.png ]; then
            sips -z 512 512 icons/icon-512.png --out icon.iconset/icon_512x512.png
          fi
          iconutil -c icns icon.iconset || true
      
      - name: Build .app bundle
        run: cargo bundle --release
        continue-on-error: true
      
      - name: Create DMG installer
        run: |
          if [ -d "target/release/bundle/osx/Copy_prog.app" ]; then
            hdiutil create -volname "Copy_prog" -srcfolder target/release/bundle/osx/Copy_prog.app -ov -format UDZO copy_prog-macos-x64.dmg
          else
            # Fallback: just archive the binary
            mkdir -p release-macos
            cp target/release/copy_prog release-macos/
            tar czf copy_prog-macos-x64.tar.gz -C release-macos .
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            copy_prog-macos-x64.dmg
            copy_prog-macos-x64.tar.gz

  # === СОЗДАНИЕ РЕЛИЗА ===
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp windows-build/*.zip release-files/ 2>/dev/null || true
          cp linux-build/*.deb release-files/ 2>/dev/null || true
          cp linux-build/*.tar.gz release-files/ 2>/dev/null || true
          cp macos-build/*.dmg release-files/ 2>/dev/null || true
          cp macos-build/*.tar.gz release-files/ 2>/dev/null || true
          ls -la release-files/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}